<!DOCTYPE html>
<html>
<head>
  <title>V4 Quant Multi-Timeframe Dashboard</title>
  <style>
    body { font-family: Arial; background:#0b1220; color:white; padding:20px; }
    h2 { margin-bottom:5px; }
    table { width:100%; border-collapse: collapse; margin-top:20px; }
    th, td { border:1px solid #334155; padding:8px; text-align:center; font-size:13px; }
    th { background:#1e293b; }
    input, button { padding:10px; margin:5px; }
    button { cursor:pointer; }
    .buy { color:#22c55e; font-weight:bold; }
    .sell { color:#ef4444; font-weight:bold; }
    .neutral { color:#facc15; }
    .aplus { background:#14532d; }
    .danger { background:#3b1d1d; }
  </style>
</head>

<body>

<h2>📊 V4 MULTI-TIMEFRAME QUANT DASHBOARD</h2>
<p>15m + 1H + 1D + 1W confluence scoring system</p>

<input id="stockInput" placeholder="Add ticker (NVDA)" />
<button onclick="addStock()">➕ Add</button>
<button onclick="clearAll()">🗑 Clear</button>
<button onclick="load()">🔄 Refresh</button>

<table>
  <thead>
    <tr>
      <th>Stock</th>
      <th>15m</th>
      <th>1H</th>
      <th>1D</th>
      <th>1W</th>
      <th>Buy Score</th>
      <th>Sell Score</th>
      <th>Bias</th>
      <th>Remove</th>
    </tr>
  </thead>
  <tbody id="data"></tbody>
</table>

<script>

// ---------------- STORAGE ----------------
function getWatchlist(){
  return JSON.parse(localStorage.getItem("watchlist") || "[]");
}

function saveWatchlist(list){
  localStorage.setItem("watchlist", JSON.stringify(list));
}

// ---------------- ADD / REMOVE ----------------
function addStock(){
  let s = document.getElementById("stockInput").value.toUpperCase().trim();
  if(!s) return;

  let list = getWatchlist();
  if(!list.includes(s)) list.push(s);

  saveWatchlist(list);
  document.getElementById("stockInput").value = "";
  load();
}

function removeStock(s){
  let list = getWatchlist().filter(x => x !== s);
  saveWatchlist(list);
  load();
}

function clearAll(){
  localStorage.removeItem("watchlist");
  load();
}

// ---------------- DATA ----------------
async function fetchStock(symbol){
  const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbol}`;
  const res = await fetch(url);
  const json = await res.json();
  return json.quoteResponse.result[0];
}

// ---------------- RSI PROXY ----------------
function rsi(change){
  let r = 50 + (change * 5);
  return Math.max(20, Math.min(80, Math.round(r)));
}

// ---------------- TIMEFRAME SCORE ----------------
function score(change, rsi, tf){

  let weight = {
    "15m": 1.5,
    "1h": 1,
    "1d": 0.7,
    "1w": 0.4
  }[tf];

  let buy = 0;
  let sell = 0;

  if(change > 1) buy += 25 * weight;
  if(change > 0.3) buy += 10 * weight;

  if(change < -1) sell += 25 * weight;
  if(change < -0.3) sell += 10 * weight;

  if(rsi > 60) buy += 20 * weight;
  if(rsi < 40) sell += 20 * weight;

  if(change > 0) buy += 10 * weight;
  if(change < 0) sell += 10 * weight;

  return {buy, sell};
}

// ---------------- BIAS ----------------
function bias(buy, sell){
  if(buy >= 180) return "🔥 A+ BUY";
  if(sell >= 180) return "🔥 A+ SELL";
  if(buy > sell + 40) return "BUY";
  if(sell > buy + 40) return "SELL";
  return "NEUTRAL";
}

// ---------------- MAIN ----------------
async function load(){

  const table = document.getElementById("data");
  table.innerHTML = "";

  let list = getWatchlist();

  if(list.length === 0){
    table.innerHTML = "<tr><td colspan='9'>Add stocks to begin</td></tr>";
    return;
  }

  for(let s of list){

    try{
      const d = await fetchStock(s);

      let change = d.regularMarketChangePercent || 0;
      let price = d.regularMarketPrice;

      let r = rsi(change);

      // MULTI TIMEFRAME SIMULATION
      let tf15 = score(change * 1.2, r + 5, "15m");
      let tf1h = score(change, r, "1h");
      let tf1d = score(change * 0.7, r - 5, "1d");
      let tf1w = score(change * 0.4, r - 10, "1w");

      let buy = tf15.buy + tf1h.buy + tf1d.buy + tf1w.buy;
      let sell = tf15.sell + tf1h.sell + tf1d.sell + tf1w.sell;

      let finalBias = bias(buy, sell);

      let cls = finalBias.includes("A+") ? "aplus" : "";

      table.innerHTML += `
        <tr class="${cls}">
          <td>${s}<br><small>${price}</small></td>

          <td>${tf15.buy.toFixed(0)}</td>
          <td>${tf1h.buy.toFixed(0)}</td>
          <td>${tf1d.buy.toFixed(0)}</td>
          <td>${tf1w.buy.toFixed(0)}</td>

          <td class="buy">${buy.toFixed(0)}</td>
          <td class="sell">${sell.toFixed(0)}</td>
          <td>${finalBias}</td>

          <td><button onclick="removeStock('${s}')">❌</button></td>
        </tr>
      `;

    } catch(e){
      console.log("error", s);
    }
  }
}

load();

</script>

</body>
</html>
