<!DOCTYPE html>
<html>
<head>
  <title>V6 Real Quant Engine</title>
  <style>
    body { font-family: Arial; background:#0b1220; color:white; padding:20px; }
    input, button { padding:10px; margin:5px; }
    .card { background:#1e293b; padding:15px; margin-top:15px; border-radius:10px; }
    .buy { color:#22c55e; font-weight:bold; }
    .sell { color:#ef4444; font-weight:bold; }
  </style>
</head>

<body>

<h2>📊 V6 REAL QUANT ENGINE</h2>

<input id="stockInput" placeholder="Add stock (AAPL)" />
<button onclick="addStock()">➕ Add</button>
<button onclick="resetDefaults()">♻ Reset</button>

<div id="container"></div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

/* ---------------- WATCHLIST ---------------- */
let watchlist = [];

const defaults = [
  "NVDA","TSLA","AAPL","META","GOOGL","NFLX",
  "AMD","QCOM","TSM","MU","AVGO","ASML","ARM"
];

/* ---------------- INIT ---------------- */
function init(){
  try{
    const saved = localStorage.getItem("watchlist");
    watchlist = saved ? JSON.parse(saved) : defaults;
    if(!Array.isArray(watchlist)) watchlist = defaults;
  }catch{
    watchlist = defaults;
  }
}

/* ---------------- SAVE ---------------- */
function save(){
  localStorage.setItem("watchlist", JSON.stringify(watchlist));
}

/* ---------------- ADD ---------------- */
function addStock(){
  let v = document.getElementById("stockInput").value.toUpperCase().trim();
  if(!v) return;

  if(!watchlist.includes(v)){
    watchlist.push(v);
    save();
  }

  document.getElementById("stockInput").value="";
  load();
}

/* ---------------- RESET ---------------- */
function resetDefaults(){
  watchlist = defaults;
  save();
  load();
}

/* ---------------- REMOVE ---------------- */
function removeStock(s){
  watchlist = watchlist.filter(x => x !== s);
  save();
  load();
}

/* ---------------- REAL DATA (STOOQ FREE API) ---------------- */
async function fetchStock(symbol){
  try {
    const url = `https://stooq.com/q/l/?s=${symbol.toLowerCase()}.us&f=sd2t2ohlcv&h&e=json`;
    const res = await fetch(url);
    const data = await res.json();

    const d = data?.symbols?.[0];
    if(!d) return null;

    let price = parseFloat(d.close);
    let open = parseFloat(d.open);

    let change = ((price - open) / open) * 100;

    return {
      price,
      change
    };

  } catch(e){
    console.log("API error", e);
    return null;
  }
}

/* ---------------- SCORING ENGINE ---------------- */
function scoreEngine(change){

  let buy = 0;
  let sell = 0;

  if(change > 2) buy += 80;
  if(change < -2) sell += 80;

  if(change > 1) buy += 50;
  if(change < -1) sell += 50;

  if(change > 0.3) buy += 20;
  if(change < -0.3) sell += 20;

  let bias = "NEUTRAL";

  if(buy > sell + 40) bias = "BUY";
  if(sell > buy + 40) bias = "SELL";

  if(buy > 100) bias = "🔥 A+ BUY";
  if(sell > 100) bias = "🔥 A+ SELL";

  return {buy, sell, bias};
}

/* ---------------- LOAD ---------------- */
async function load(){

  init();

  let container = document.getElementById("container");
  container.innerHTML = "";

  for(let s of watchlist){

    let d = await fetchStock(s);

    if(!d){
      container.innerHTML += `<div class="card">❌ ${s} data unavailable</div>`;
      continue;
    }

    let score = scoreEngine(d.change);

    container.innerHTML += `
      <div class="card">
        <h3>${s} <button onclick="removeStock('${s}')">❌</button></h3>

        <p>
          Price: <b>${d.price}</b><br>
          Change: <b>${d.change.toFixed(2)}%</b><br>
          Buy: <span class="buy">${score.buy}</span> | 
          Sell: <span class="sell">${score.sell}</span><br>
          <b>${score.bias}</b>
        </p>

        <div id="tv_${s}" style="height:300px;"></div>
      </div>
    `;

    setTimeout(()=>{
      new TradingView.widget({
        width: "100%",
        height: 300,
        symbol: "NASDAQ:" + s,
        interval: "60",
        timezone: "America/Los_Angeles",
        theme: "dark",
        style: "1",
        container_id: "tv_" + s
      });
    }, 200);
  }
}

load();

</script>

</body>
</html>
